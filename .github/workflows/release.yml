name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build skill
        run: make build

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: play-fixai-game.skill
